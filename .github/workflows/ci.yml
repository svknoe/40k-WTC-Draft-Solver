name: CI

# push is limited to main so PR-branch pushes don't trigger a duplicate run
# alongside the pull_request event.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        # Explicit bash gets -o pipefail, so a failure on either side of the
        # smoke test's pipe fails the step.
        shell: bash
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Smoke test (scripts/smoke_draft.py)
        run: printf '\n\n\n\n\n\nn\n' | python scripts/smoke_draft.py

      - name: Fast golden tests
        run: python -m pytest
