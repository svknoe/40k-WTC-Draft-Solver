# Build the web app (web/) and publish it to GitHub Pages
# (docs/web-design.md §9). Runs on pushes to main that touch web/, and can be
# triggered manually. Independent of ci.yml (Python) and web-ci.yml (TS tests).
name: Deploy Pages

on:
  push:
    branches: [main]
    paths: ["web/**", ".github/workflows/deploy-pages.yml"]
  workflow_dispatch:

# Allow the deploy job to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deploy at a time; don't cancel a running one mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite, base=/40k-WTC-Draft-Solver/)
        run: npm run build

      - name: Disable Jekyll on the published output
        run: touch dist/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
