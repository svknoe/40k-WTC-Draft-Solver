# Web engine CI (docs/web-design.md §7.2): typecheck + the FULL conformance
# suite — including the Scotland k=4/exact solves (seconds in TS) — on every
# push/PR that touches web/. The conformance fixtures are frozen goldens,
# exported from the retired Python engine (last source: git tag
# v-final-pre-python-removal); they pin the engine's 4/6/8-player values,
# counts, and sample-node strategies against drift.
name: Web CI

on:
  push:
    branches: [main]
    paths: ["web/**", ".github/workflows/web-ci.yml"]
  pull_request:
    paths: ["web/**", ".github/workflows/web-ci.yml"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Conformance suite (full, incl. Scotland k=4 + exact)
        run: npm test
        env:
          CONFORMANCE_SLOW: "1"
