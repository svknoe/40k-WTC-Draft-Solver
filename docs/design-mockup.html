document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

0FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>body{margin:0;background:#101418}@keyframes wtcFlip{from{transform:rotateY(80deg);opacity:0}to{transform:none;opacity:1}}@keyframes wtcSpin{to{transform:rotate(360deg)}}<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;background:#101418;color:#dde2e8;font-family:'IBM Plex Sans',sans-serif;display:flex;flex-direction:column\">\n\n  <!-- ============ HEADER ============ -->\n  <div style=\"display:flex;align-items:center;gap:14px;padding:12px 20px;border-bottom:1px solid #ffffff12;flex-wrap:wrap\">\n    <div style=\"font-size:13px;font-weight:700;letter-spacing:.04em\">WTC DRAFT TRAINER<\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600\"><span style=\"color:#4e9af1\">{{ myTeam }}<\u002Fspan><span style=\"color:#6b7480;font-weight:400\">vs<\u002Fspan><span style=\"color:{{ enC }}\">{{ enemyTeam }}<\u002Fspan><\u002Fdiv>\n    <div style=\"display:flex;gap:6px;margin-left:8px\">\n      <sc-for list=\"{{ tabs }}\" as=\"t\" hint-placeholder-count=\"3\">\n        <button onclick=\"{{ t.go }}\" style=\"font-family:inherit;font-size:12px;font-weight:600;padding:7px 14px;border-radius:7px;cursor:pointer;background:{{ t.bg }};color:{{ t.fg }};border:1px solid {{ t.brd }}\" style-hover=\"filter:brightness(1.15)\">{{ t.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"flex:1\"><\u002Fdiv>\n    <button onclick=\"{{ openAbout }}\" title=\"What this app is, and how your data is handled\" style=\"display:flex;align-items:center;gap:7px;font-family:inherit;font-size:11.5px;font-weight:500;color:#aeb6c0;background:#ffffff0d;border:1px solid #ffffff1a;border-radius:7px;padding:7px 12px;cursor:pointer\" style-hover=\"filter:brightness(1.2)\"><span style=\"width:8px;height:8px;border-radius:2px;background:#45c48f\"><\u002Fspan>Local-only <span style=\"color:#6b7480;font-size:13px\">ⓘ<\u002Fspan><\u002Fbutton>\n    <button onclick=\"{{ toggleCb }}\" style=\"display:flex;align-items:center;gap:7px;font-family:inherit;font-size:11.5px;font-weight:500;color:#aeb6c0;background:#ffffff0d;border:1px solid #ffffff1a;border-radius:7px;padding:7px 12px;cursor:pointer\" style-hover=\"filter:brightness(1.2)\"><span style=\"width:8px;height:8px;border-radius:50%;background:{{ cbDot }}\"><\u002Fspan>{{ cbLabel }}<\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- ============ ABOUT / TRUST ============ -->\n  <sc-if value=\"{{ aboutOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ onAboutClose }}\" style=\"position:fixed;inset:0;background:#000000b0;display:grid;place-items:center;z-index:60;padding:20px\">\n      <div onclick=\"{{ stopProp }}\" style=\"background:#161b20;border:1px solid #ffffff1f;border-radius:14px;padding:24px;width:min(520px,100%);display:flex;flex-direction:column;gap:16px\">\n        <div style=\"display:flex;align-items:flex-start;gap:12px\">\n          <div style=\"display:flex;flex-direction:column;gap:4px\">\n            <div style=\"font-size:17px;font-weight:700;letter-spacing:.02em\">WTC Draft Trainer<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#8b94a0;line-height:1.5\">Build your matchup matrix, solve the pairing game, and rehearse the captain's draft against a bot before the event.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1\"><\u002Fdiv>\n          <button onclick=\"{{ onAboutClose }}\" style=\"font-family:inherit;font-size:14px;color:#6b7480;background:none;border:none;cursor:pointer;padding:2px 4px\" style-hover=\"color:#dde2e8\">✕<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:4px;background:#14181d;border:1px solid #ffffff12;border-left:3px solid #45c48f;border-radius:10px;padding:14px\">\n          <div style=\"font-size:13px;font-weight:600;color:#dde2e8\">Everything stays on your computer<\u002Fdiv>\n          <div style=\"font-size:12px;color:#8b94a0;line-height:1.55\">Your matrices and practice drafts are a competitive edge, so they never leave this device. They're saved only in this browser — no account, no server, no sync. Use Export JSON to share prep with teammates on your own terms.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:4px;background:#14181d;border:1px solid #ffffff12;border-left:3px solid #4e9af1;border-radius:10px;padding:14px\">\n          <div style=\"font-size:13px;font-weight:600;color:#dde2e8\">Built for practice, not for live events<\u002Fdiv>\n          <div style=\"font-size:12px;color:#8b94a0;line-height:1.55\">This is a training tool. Coaching hints automatically switch off during official WTC dates, so the app can't be used to gain an edge at the table. They come back on their own once the event is over.<\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ onAboutClose }}\" style=\"align-self:flex-end;font-family:inherit;font-size:13px;font-weight:600;color:#101418;background:#4e9af1;border:none;border-radius:8px;padding:9px 20px;cursor:pointer\" style-hover=\"filter:brightness(1.1)\">Got it<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ CONFIRM DISCARD ============ -->\n  <sc-if value=\"{{ confirmOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ onConfirmCancel }}\" style=\"position:fixed;inset:0;background:#000000b0;display:grid;place-items:center;z-index:70;padding:20px\">\n      <div onclick=\"{{ stopProp }}\" style=\"background:#161b20;border:1px solid #ffffff1f;border-radius:14px;padding:24px;width:min(420px,100%);display:flex;flex-direction:column;gap:14px\">\n        <div style=\"font-size:16px;font-weight:700\">Discard your practice draft?<\u002Fdiv>\n        <div style=\"font-size:12.5px;color:#8b94a0;line-height:1.55\">You have a draft in progress. This change alters the matrix, which will reset your draft and any solver result. This can't be undone.<\u002Fdiv>\n        <div style=\"display:flex;gap:10px;justify-content:flex-end\">\n          <button onclick=\"{{ onConfirmCancel }}\" style=\"font-family:inherit;font-size:13px;color:#aeb6c0;background:#ffffff0d;border:1px solid #ffffff1a;border-radius:7px;padding:9px 16px;cursor:pointer\">Keep draft<\u002Fbutton>\n          <button onclick=\"{{ onConfirmOk }}\" style=\"font-family:inherit;font-size:13px;font-weight:600;color:#101418;background:#e0573e;border:none;border-radius:7px;padding:9px 16px;cursor:pointer\" style-hover=\"filter:brightness(1.1)\">Discard &amp; continue<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ MATRIX EDITOR ============ -->\n  <sc-if value=\"{{ isMatrix }}\" hint-placeholder-val=\"{{ true }}\">\n  <sc-if value=\"{{ draftLive }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:#e0914b14;border:1px solid #e0914b55;border-radius:10px;padding:12px 16px;margin:18px 20px 0\">\n      <div style=\"width:8px;height:8px;border-radius:2px;background:#e0914b;flex-shrink:0\"><\u002Fdiv>\n      <div style=\"font-size:12.5px;color:#dde2e8;line-height:1.5\">A practice draft is in progress — matrix editing is paused so your draft and solver stay consistent with the numbers you drafted on.<\u002Fdiv>\n      <div style=\"flex:1\"><\u002Fdiv>\n      <button onclick=\"{{ onDiscardDraft }}\" style=\"font-family:inherit;font-size:12px;font-weight:600;color:#101418;background:#e0914b;border:none;border-radius:7px;padding:8px 14px;cursor:pointer\" style-hover=\"filter:brightness(1.1)\">Discard draft to edit<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n  <div data-screen-label=\"Matrix editor\" style=\"display:flex;flex-wrap:wrap;gap:24px;padding:22px 20px;align-items:flex-start\">\n\n    <div style=\"flex:1 1 230px;min-width:220px;max-width:300px;display:flex;flex-direction:column;gap:12px\">\n      <div style=\"font-size:11px;font-weight:700;letter-spacing:.07em;color:#8b94a0\">SAVED OPPONENTS<\u002Fdiv>\n      <sc-for list=\"{{ saves }}\" as=\"sv\" hint-placeholder-count=\"1\">\n        <div style=\"display:flex;align-items:center;gap:8px;background:{{ sv.bg }};border:1px solid {{ sv.brd }};border-radius:9px;padding:10px 12px\">\n          <div onclick=\"{{ sv.load }}\" style=\"flex:1;cursor:pointer;min-width:0\">\n            <div style=\"font-size:13px;font-weight:600;color:#dde2e8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ sv.name }}<\u002Fdiv>\n            <div style=\"font-size:11px;color:#6b7480\">{{ sv.date }}<\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ sv.del }}\" style=\"font-family:inherit;font-size:12px;color:#6b7480;background:none;border:none;cursor:pointer;padding:4px\" style-hover=\"color:{{ errC }}\">✕<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n      <sc-if value=\"{{ noSaves }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"border:1px dashed #ffffff1f;border-radius:9px;padding:12px;font-size:12px;color:#6b7480;line-height:1.5\">No saved opponents yet. Name this matchup and hit Save.<\u002Fdiv>\n      <\u002Fsc-if>\n      <div style=\"display:flex;gap:8px\">\n        <input value=\"{{ saveName }}\" onchange=\"{{ onSaveName }}\" placeholder=\"Save as…\" style=\"flex:1;min-width:0;background:#161b20;border:1px solid #ffffff1a;border-radius:7px;color:#dde2e8;padding:8px 10px;font-family:inherit;font-size:12.5px\" style-focus=\"border-color:#4e9af1;outline:none\">\n        <button onclick=\"{{ onSave }}\" style=\"font-family:inherit;font-size:12px;font-weight:600;color:#101418;background:#4e9af1;border:none;border-radius:7px;padding:8px 14px;cursor:pointer\" style-hover=\"filter:brightness(1.1)\">Save<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:8px;flex-wrap:wrap\">\n        <button onclick=\"{{ onExport }}\" style=\"flex:1;font-family:inherit;font-size:12px;font-weight:500;color:#aeb6c0;background:#ffffff0d;border:1px solid #ffffff1a;border-radius:7px;padding:8px 10px;cursor:pointer\" style-hover=\"filter:brightness(1.2)\">Export JSON<\u002Fbutton>\n        <button onclick=\"{{ onImportClick }}\" style=\"flex:1;font-family:inherit;font-size:12px;font-weight:500;color:#aeb6c0;background:#ffffff0d;border:1px solid #ffffff1a;border-radius:7px;padding:8px 10px;cursor:pointer\" style-hover=\"filter:brightness(1.2)\">Import JSON<\u002Fbutton>\n        <input type=\"file\" accept=\".json\" ref=\"{{ fileRef }}\" onchange=\"{{ onImportFile }}\" style=\"display:none\">\n      <\u002Fdiv>\n      <button onclick=\"{{ onPasteOpen }}\" style=\"font-family:inherit;font-size:12px;font-weight:500;color:#aeb6c0;background:#ffffff0d;border:1px solid #ffffff1a;border-radius:7px;padding:9px 10px;cursor:pointer\" style-hover=\"filter:brightness(1.2)\">Paste from spreadsheet…<\u002Fbutton>\n      <div style=\"font-size:11px;color:#6b7480;line-height:1.55\">Matrices stay in this browser — never uploaded to any server. Export a JSON file to share prep with teammates on your terms.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"flex:1 1 640px;min-width:0;display:flex;flex-direction:column;gap:14px\">\n      <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap\">\n        <input value=\"{{ myTeam }}\" onchange=\"{{ onMyTeam }}\" readonly=\"{{ ro }}\" style=\"width:130px;background:#161b20;border:1px solid #ffffff1a;border-radius:7px;color:#4e9af1;font-weight:600;padding:8px 10px;font-family:inherit;font-size:13px\" style-focus=\"border-color:#4e9af1;outline:none\">\n        <span style=\"font-size:12px;color:#6b7480\">rows · my team<\u002Fspan>\n        <span style=\"color:#4a525c\">vs<\u002Fspan>\n        <input value=\"{{ enemyTeam }}\" onchange=\"{{ onEnemyTeam }}\" readonly=\"{{ ro }}\" style=\"width:130px;background:#161b20;border:1px solid #ffffff1a;border-radius:7px;color:{{ enC }};font-weight:600;padding:8px 10px;font-family:inherit;font-size:13px\" style-focus=\"border-color:{{ enC }};outline:none\">\n        <span style=\"font-size:12px;color:#6b7480\">columns · opponent<\u002Fspan>\n        <button onclick=\"{{ onTranspose }}\" title=\"Swap which side you captain — transposes the matrix and team names\" style=\"display:flex;align-items:center;gap:7px;font-family:inherit;font-size:12px;font-weight:600;color:#aeb6c0;background:#ffffff0d;border:1px solid #ffffff1a;border-radius:7px;padding:8px 13px;cursor:pointer\" style-hover=\"filter:brightness(1.2)\">⇄ Swap sides<\u002Fbutton>\n        <div style=\"flex:1\"><\u002Fdiv>\n        <div style=\"display:flex;gap:3px;background:#161b20;border:1px solid #ffffff1a;border-radius:8px;padding:3px\">\n          <button onclick=\"{{ setSimple }}\" style=\"font-family:inherit;font-size:11.5px;font-weight:600;padding:6px 12px;border-radius:6px;border:none;cursor:pointer;background:{{ simBg }};color:{{ simFg }}\">Single rating<\u002Fbutton>\n          <button onclick=\"{{ setDetailed }}\" style=\"font-family:inherit;font-size:11.5px;font-weight:600;padding:6px 12px;border-radius:6px;border:none;cursor:pointer;background:{{ detBg }};color:{{ detFg }}\">Best / worst map<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <sc-if value=\"{{ hasErrs }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:{{ enC14 }};border:1px solid {{ enC40 }};border-radius:8px;padding:10px 14px;font-size:12.5px;color:{{ errC }}\">{{ errMsg }}<\u002Fdiv>\n      <\u002Fsc-if>\n      <div style=\"overflow-x:auto;padding-bottom:6px;opacity:{{ editOpacity }}\">\n        <div style=\"display:flex;flex-direction:column;gap:4px;min-width:860px\">\n          <div style=\"display:grid;grid-template-columns:148px repeat(8,86px);gap:4px\">\n            <div style=\"display:flex;align-items:flex-end;padding:0 4px 4px;font-size:10.5px;color:#6b7480;line-height:1.4\">{{ cornerLabel }}<\u002Fdiv>\n            <sc-for list=\"{{ colHeads }}\" as=\"ch\" hint-placeholder-count=\"8\">\n              <input value=\"{{ ch.name }}\" onchange=\"{{ ch.onName }}\" readonly=\"{{ ro }}\" style=\"width:100%;box-sizing:border-box;background:#161b20;border:1px solid #ffffff1a;border-radius:7px;color:{{ enC }};font-weight:600;padding:7px 6px;font-family:inherit;font-size:11.5px;text-align:center\" style-focus=\"border-color:{{ enC }};outline:none\">\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <sc-for list=\"{{ rows }}\" as=\"r\" hint-placeholder-count=\"8\">\n            <div style=\"display:grid;grid-template-columns:148px repeat(8,86px);gap:4px\">\n              <input value=\"{{ r.name }}\" onchange=\"{{ r.onName }}\" readonly=\"{{ ro }}\" style=\"width:100%;box-sizing:border-box;background:#161b20;border:1px solid #ffffff1a;border-radius:7px;color:#4e9af1;font-weight:600;padding:7px 8px;font-family:inherit;font-size:12px\" style-focus=\"border-color:#4e9af1;outline:none\">\n              <sc-for list=\"{{ r.cells }}\" as=\"c\" hint-placeholder-count=\"8\">\n                <div style=\"display:flex;align-items:center;justify-content:center;gap:1px;background:#14181d;border:1px solid #ffffff12;border-radius:7px;padding:6px 3px\">\n                  <input value=\"{{ c.b }}\" onchange=\"{{ c.onB }}\" readonly=\"{{ ro }}\" inputmode=\"decimal\" style=\"width:{{ c.bW }};text-align:center;background:none;border:1px solid {{ c.bBrd }};border-radius:5px;color:{{ c.bC }};font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;padding:2px 0\" style-focus=\"border-color:#4e9af1;outline:none\">\n                  <span style=\"color:#3a424c;font-size:11px;display:{{ c.wDisp }}\">/<\u002Fspan>\n                  <input value=\"{{ c.w }}\" onchange=\"{{ c.onW }}\" readonly=\"{{ ro }}\" inputmode=\"decimal\" style=\"display:{{ c.wDisp }};width:30px;text-align:center;background:none;border:1px solid {{ c.wBrd }};border-radius:5px;color:{{ c.wC }};font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;padding:2px 0\" style-focus=\"border-color:#4e9af1;outline:none\">\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:16px;flex-wrap:wrap;font-size:11.5px;color:#8b94a0\">\n        <span>Each cell: my expected score, 0–20 · <span style=\"font-family:'IBM Plex Mono',monospace\">10<\u002Fspan> = even game<\u002Fspan>\n        <span style=\"display:flex;align-items:center;gap:5px\"><span style=\"width:9px;height:9px;border-radius:2px;background:{{ legC0 }}\"><\u002Fspan>worst ≤ 4<\u002Fspan>\n        <span style=\"display:flex;align-items:center;gap:5px\"><span style=\"width:9px;height:9px;border-radius:2px;background:{{ legC5 }}\"><\u002Fspan>bad 5–8<\u002Fspan>\n        <span style=\"display:flex;align-items:center;gap:5px\"><span style=\"width:9px;height:9px;border-radius:2px;background:#b9c0c8\"><\u002Fspan>okay 9–11<\u002Fspan>\n        <span style=\"display:flex;align-items:center;gap:5px\"><span style=\"width:9px;height:9px;border-radius:2px;background:{{ legC12 }}\"><\u002Fspan>good 12–15<\u002Fspan>\n        <span style=\"display:flex;align-items:center;gap:5px\"><span style=\"width:9px;height:9px;border-radius:2px;background:{{ legC16 }}\"><\u002Fspan>best 16+<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- paste modal -->\n  <sc-if value=\"{{ pasteOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;background:#000000a8;display:grid;place-items:center;z-index:50;padding:20px\">\n      <div style=\"background:#161b20;border:1px solid #ffffff1f;border-radius:12px;padding:20px;width:min(640px,100%);display:flex;flex-direction:column;gap:12px\">\n        <div style=\"font-size:15px;font-weight:600\">Paste from spreadsheet<\u002Fdiv>\n        <div style=\"font-size:12px;color:#8b94a0;line-height:1.55\">8 rows × 8 cells, tab / comma / semicolon separated. Cells like <span style=\"font-family:'IBM Plex Mono',monospace;color:#b9c0c8\">15/12<\u002Fspan>, single numbers like <span style=\"font-family:'IBM Plex Mono',monospace;color:#b9c0c8\">13<\u002Fspan>, or 16 plain number columns (best, worst alternating).<\u002Fdiv>\n        <textarea value=\"{{ pasteText }}\" onchange=\"{{ onPasteText }}\" rows=\"10\" placeholder=\"15/12\t11/8\t…\" style=\"background:#101418;border:1px solid #ffffff1a;border-radius:8px;color:#dde2e8;font-family:'IBM Plex Mono',monospace;font-size:12px;padding:10px;resize:vertical\" style-focus=\"border-color:#4e9af1;outline:none\"><\u002Ftextarea>\n        <sc-if value=\"{{ hasPasteErr }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size:12px;color:{{ errC }};line-height:1.5\">{{ pasteErr }}<\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"display:flex;gap:10px;justify-content:flex-end\">\n          <button onclick=\"{{ onPasteClose }}\" style=\"font-family:inherit;font-size:13px;color:#aeb6c0;background:#ffffff0d;border:1px solid #ffffff1a;border-radius:7px;padding:9px 16px;cursor:pointer\">Cancel<\u002Fbutton>\n          <button onclick=\"{{ onPasteApply }}\" style=\"font-family:inherit;font-size:13px;font-weight:600;color:#101418;background:#4e9af1;border:none;border-radius:7px;padding:9px 16px;cursor:pointer\" style-hover=\"filter:brightness(1.1)\">Apply to grid<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n  <\u002Fsc-if>\n\n  <!-- ============ SOLVE VIEW ============ -->\n  <sc-if value=\"{{ isSolve }}\" hint-placeholder-val=\"{{ false }}\">\n  <div data-screen-label=\"Solve view\" style=\"width:min(960px,100%);box-sizing:border-box;margin:0 auto;padding:30px 20px;display:flex;flex-direction:column;gap:20px\">\n    <sc-if value=\"{{ hasErrs }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:{{ enC14 }};border:1px solid {{ enC40 }};border-radius:8px;padding:12px 16px;font-size:13px;color:{{ errC }}\">{{ errMsg }} Fix the matrix before solving.<\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ solIdle }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#161b20;border:1px solid #ffffff14;border-radius:12px;padding:34px;display:flex;flex-direction:column;align-items:flex-start;gap:14px\">\n        <div style=\"font-size:19px;font-weight:600\">Solve the pairing game<\u002Fdiv>\n        <div style=\"font-size:13px;color:#8b94a0;line-height:1.6;max-width:560px\">Computes the full draft equilibrium from the current matchup matrix: your expected team result and the optimal mixed strategy for the opening defender put-up, on both sides.<\u002Fdiv>\n        <button onclick=\"{{ onRun }}\" style=\"font-family:inherit;font-size:14px;font-weight:600;color:#101418;background:#4e9af1;border:none;border-radius:8px;padding:12px 26px;cursor:pointer\" style-hover=\"filter:brightness(1.1)\">Run solver<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ solRunning }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#161b20;border:1px solid #ffffff14;border-radius:12px;padding:34px;display:flex;flex-direction:column;gap:16px\">\n        <div style=\"display:flex;align-items:center;gap:12px\">\n          <div style=\"width:18px;height:18px;border:2px solid #ffffff1f;border-top-color:#4e9af1;border-radius:50%;animation:wtcSpin .8s linear infinite\"><\u002Fdiv>\n          <div style=\"font-size:13px;color:#aeb6c0\">{{ solMsg }}<\u002Fdiv>\n          <div style=\"flex:1\"><\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;color:#8b94a0\">{{ solProgPct }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"height:8px;border-radius:4px;background:#ffffff10;overflow:hidden\"><div style=\"height:8px;border-radius:4px;background:#4e9af1;width:{{ solProgW }};transition:width .1s linear\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ solDone }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;flex-direction:column;gap:20px\">\n        <div style=\"background:#161b20;border:1px solid #ffffff14;border-radius:12px;padding:26px 30px;display:flex;align-items:center;gap:26px;flex-wrap:wrap\">\n          <div style=\"display:flex;flex-direction:column;gap:6px\">\n            <div style=\"font-size:11px;font-weight:700;letter-spacing:.07em;color:#8b94a0\">EXPECTED DRAFT RESULT<\u002Fdiv>\n            <div style=\"display:flex;align-items:baseline;gap:12px;font-family:'IBM Plex Mono',monospace;font-weight:600\">\n              <span style=\"font-size:42px;color:#4e9af1\">{{ expMine }}<\u002Fspan>\n              <span style=\"font-size:24px;color:#4a525c\">–<\u002Fspan>\n              <span style=\"font-size:42px;color:{{ enC }}\">{{ expEnemy }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1\"><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:4px;align-items:flex-end\">\n            <div style=\"font-size:14px;font-weight:600;color:{{ expNoteC }}\">{{ expNote }}<\u002Fdiv>\n            <div style=\"font-size:11.5px;color:#6b7480\">sum of 8 games · 160 points total<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:20px;flex-wrap:wrap\">\n          <div style=\"flex:1 1 380px;background:#161b20;border:1px solid #ffffff14;border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:11px\">\n            <div style=\"font-size:12px;font-weight:700;letter-spacing:.05em;color:#4e9af1\">{{ myMixTitle }}<\u002Fdiv>\n            <sc-for list=\"{{ myBars }}\" as=\"b\" hint-placeholder-count=\"8\">\n              <div style=\"display:flex;align-items:center;gap:10px;font-size:13px\">\n                <div style=\"width:138px;color:#c3cad2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ b.name }}<\u002Fdiv>\n                <div style=\"flex:1;height:8px;border-radius:4px;background:#ffffff10\"><div style=\"height:8px;border-radius:4px;background:#4e9af1;width:{{ b.w }}\"><\u002Fdiv><\u002Fdiv>\n                <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:#8b94a0;width:38px;text-align:right\">{{ b.pct }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"flex:1 1 380px;background:#161b20;border:1px solid #ffffff14;border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:11px\">\n            <div style=\"font-size:12px;font-weight:700;letter-spacing:.05em;color:{{ enC }}\">{{ enMixTitle }}<\u002Fdiv>\n            <sc-for list=\"{{ enBars }}\" as=\"b\" hint-placeholder-count=\"8\">\n              <div style=\"display:flex;align-items:center;gap:10px;font-size:13px\">\n                <div style=\"width:138px;color:#c3cad2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ b.name }}<\u002Fdiv>\n                <div style=\"flex:1;height:8px;border-radius:4px;background:#ffffff10\"><div style=\"height:8px;border-radius:4px;background:{{ enC }};width:{{ b.w }}\"><\u002Fdiv><\u002Fdiv>\n                <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:#8b94a0;width:38px;text-align:right\">{{ b.pct }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:12px;flex-wrap:wrap\">\n          <button onclick=\"{{ onRun }}\" style=\"font-family:inherit;font-size:13px;color:#aeb6c0;background:#ffffff0d;border:1px solid #ffffff1a;border-radius:8px;padding:11px 18px;cursor:pointer\">Re-run solver<\u002Fbutton>\n          <button onclick=\"{{ onStartDraft }}\" style=\"font-family:inherit;font-size:14px;font-weight:600;color:#101418;background:#4e9af1;border:none;border-radius:8px;padding:11px 24px;cursor:pointer\" style-hover=\"filter:brightness(1.1)\">Practice against the bot →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ DRAFT TRAINER ============ -->\n  <sc-if value=\"{{ isDraft }}\" hint-placeholder-val=\"{{ false }}\">\n  <div data-screen-label=\"Draft trainer\" style=\"display:flex;flex-direction:column;flex:1\">\n\n    <sc-if value=\"{{ draftIdle }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"width:min(680px,100%);box-sizing:border-box;margin:0 auto;padding:40px 20px\">\n        <div style=\"background:#161b20;border:1px solid #ffffff14;border-radius:12px;padding:34px;display:flex;flex-direction:column;gap:16px\">\n          <div style=\"font-size:19px;font-weight:600\">Practice draft vs the bot<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:9px;font-size:13px;color:#8b94a0;line-height:1.55\">\n            <div>· Rounds 1–2 — put up a defender, send two attackers, then choose the matchup your defender plays; two games lock each round.<\u002Fdiv>\n            <div>· Round 3 — same steps with four players: the two refused attackers face each other and the last players pair automatically, resolving all four remaining games.<\u002Fdiv>\n            <div>· Both captains pick secretly at every step. The bot's choice is revealed only after you lock yours.<\u002Fdiv>\n            <div>· At the end you're scored against the solver's pre-draft expectation.<\u002Fdiv>\n            <div>· Runs entirely on your computer — your matrix and drafts are never uploaded. Hints are training-only and switch off during official WTC dates.<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-if value=\"{{ hasErrs }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:12.5px;color:{{ errC }}\">{{ errMsg }} Fix the matrix first.<\u002Fdiv>\n          <\u002Fsc-if>\n          <div><button onclick=\"{{ onStartDraft }}\" style=\"font-family:inherit;font-size:14px;font-weight:600;color:#101418;background:#4e9af1;border:none;border-radius:8px;padding:12px 26px;cursor:pointer\" style-hover=\"filter:brightness(1.1)\">Start practice draft<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ draftOn }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;flex-direction:column;flex:1\">\n        <div style=\"display:flex;align-items:center;gap:14px;padding:13px 20px;border-bottom:1px solid #ffffff12;flex-wrap:wrap\">\n          <div style=\"display:flex;gap:6px;align-items:center\">\n            <sc-for list=\"{{ badges }}\" as=\"sb\" hint-placeholder-count=\"3\">\n              <div style=\"font-size:11px;font-weight:600;padding:5px 10px;border-radius:6px;background:{{ sb.bg }};color:{{ sb.fg }}\">{{ sb.label }}<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"width:1px;height:22px;background:#ffffff14\"><\u002Fdiv>\n          <div style=\"display:flex;align-items:baseline;gap:9px;flex-wrap:wrap\">\n            <span style=\"font-size:16px;font-weight:600\">{{ stageTitle }}<\u002Fspan>\n            <sc-if value=\"{{ hasTarget }}\" hint-placeholder-val=\"{{ false }}\">\n              <span style=\"display:inline-flex;align-items:center;gap:7px\"><span style=\"color:#8b94a0;font-size:13px\">against<\u002Fspan><span style=\"font-size:14px;font-weight:600;color:{{ enC }}\">{{ targetName }}<\u002Fspan><span style=\"font-size:10px;font-weight:600;color:#8b94a0;background:{{ enC1f }};border:1px solid {{ enC40 }};border-radius:5px;padding:2px 7px\">{{ targetTag }}<\u002Fspan><\u002Fspan>\n            <\u002Fsc-if>\n            <span style=\"font-size:12px;color:#6b7480\">{{ stageSub }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"flex:1\"><\u002Fdiv>\n          <div style=\"font-size:12px;color:#8b94a0\">Round <span style=\"font-family:'IBM Plex Mono',monospace;color:#dde2e8\">{{ roundLabel }}<\u002Fspan><\u002Fdiv>\n          <div style=\"display:{{ hintsDisp }};align-items:center;gap:7px;font-size:12px;color:#8b94a0\">Projected<span style=\"font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;color:#dde2e8\">{{ projTotal }}<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:{{ projDeltaC }}\">{{ projDelta }}<\u002Fspan><\u002Fdiv>\n          <button onclick=\"{{ toggleHints }}\" title=\"{{ hintsTip }}\" style=\"display:flex;align-items:center;gap:7px;font-family:inherit;font-size:12px;font-weight:500;color:{{ hintsFg }};background:{{ hintsBg }};border:1px solid {{ hintsBrd }};border-radius:7px;padding:7px 12px;cursor:{{ hintsCursor }};opacity:{{ hintsOp }}\" style-hover=\"filter:brightness(1.15)\"><span style=\"width:8px;height:8px;border-radius:50%;background:{{ hintsDot }}\"><\u002Fspan>{{ hintsLabel }}<\u002Fbutton>\n          <button onclick=\"{{ onUndo }}\" style=\"font-family:inherit;font-size:12px;font-weight:500;color:#aeb6c0;background:#ffffff0d;border:1px solid #ffffff1a;border-radius:7px;padding:7px 14px;cursor:pointer;opacity:{{ undoOp }}\" style-hover=\"filter:brightness(1.2)\">↩ Undo<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;flex-wrap:wrap;align-items:flex-start;flex:1\">\n          <div style=\"flex:1 1 620px;min-width:0;padding:20px;display:flex;flex-direction:column;gap:18px;border-right:1px solid #ffffff12\">\n            <div style=\"display:flex;gap:12px;flex-wrap:wrap\">\n              <sc-for list=\"{{ boards }}\" as=\"bd\" hint-placeholder-count=\"2\">\n                <div style=\"flex:1 1 230px;max-width:360px;background:#14181d;border:1px solid #ffffff12;border-radius:10px;padding:10px 12px;display:flex;flex-direction:column;gap:7px\">\n                  <div style=\"font-size:10px;font-weight:700;letter-spacing:.06em;color:#6b7480\">{{ bd.title }}<\u002Fdiv>\n                  <div style=\"display:flex;align-items:center;gap:8px;background:{{ bd.defBg }};border:{{ bd.defBrd }};border-radius:8px;padding:7px 10px;animation:{{ bd.defAnim }}\">\n                    <span style=\"font-size:9.5px;font-weight:700;letter-spacing:.05em;color:{{ bd.defTagC }}\">{{ bd.defTag }}<\u002Fspan>\n                    <span style=\"font-size:13px;font-weight:600;color:{{ bd.defC }};overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ bd.defName }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;gap:7px\">\n                    <sc-for list=\"{{ bd.slots }}\" as=\"sl\" hint-placeholder-count=\"2\">\n                      <div style=\"flex:1;min-width:0;display:flex;align-items:center;justify-content:center;background:{{ sl.bg }};border:{{ sl.brd }};border-radius:7px;padding:5px 8px;min-height:19px;opacity:{{ sl.op }};animation:{{ sl.anim }}\">\n                        <span style=\"font-size:12px;font-weight:600;color:{{ sl.c }};overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ sl.text }}<\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                  <div style=\"font-size:10.5px;color:#6b7480;line-height:1.4\">{{ bd.note }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(212px,1fr));gap:12px\">\n              <sc-for list=\"{{ cands }}\" as=\"c\" hint-placeholder-count=\"4\">\n                <div onclick=\"{{ c.onPick }}\" style=\"background:{{ c.cbg }};border:1.5px solid {{ c.brd }};border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:10px;cursor:pointer\" style-hover=\"filter:brightness(1.12)\">\n                  <div style=\"display:flex;align-items:center;gap:8px\">\n                    <div style=\"font-size:15px;font-weight:600;color:{{ c.nameC }};overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ c.name }}<\u002Fdiv>\n                    <div style=\"flex:1\"><\u002Fdiv>\n                    <div style=\"width:18px;height:18px;border-radius:50%;background:{{ c.badgeBg }};color:#101418;font-size:11px;font-weight:700;display:grid;place-items:center;opacity:{{ c.badgeOp }}\">{{ c.badgeTxt }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;align-items:baseline;gap:6px;font-size:12px;color:#8b94a0\"><span style=\"overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ c.subLabel }}<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;color:{{ c.v1c }}\">{{ c.v1 }}<\u002Fspan><span style=\"color:{{ c.sepC }}\">{{ c.sep }}<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;color:{{ c.v2c }}\">{{ c.v2 }}<\u002Fspan><\u002Fdiv>\n                  <div style=\"display:{{ hintsDisp }};align-items:center;gap:8px\">\n                    <div style=\"flex:1;height:6px;border-radius:3px;background:#ffffff10\"><div style=\"height:6px;border-radius:3px;background:{{ c.barC }};width:{{ c.barW }}\"><\u002Fdiv><\u002Fdiv>\n                    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:{{ c.pctC }};width:36px;text-align:right\">{{ c.pct }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;align-items:center;gap:14px;flex-wrap:wrap\">\n              <button onclick=\"{{ onLock }}\" style=\"font-family:inherit;font-size:14px;font-weight:600;color:{{ lockFg }};background:{{ lockBg }};border:none;border-radius:8px;padding:12px 26px;cursor:pointer\" style-hover=\"filter:brightness(1.08)\">{{ lockLabel }}<\u002Fbutton>\n              <div style=\"font-size:12px;color:#8b94a0\">{{ lockNote }}<\u002Fdiv>\n            <\u002Fdiv>\n\n            <sc-if value=\"{{ hintsOn }}\" hint-placeholder-val=\"{{ false }}\">\n grid-template-columns:{{ pmGrid }};gap:4px\">\n                      <div><\u002Fdiv>\n                      <sc-for list=\"{{ pmCols }}\" as=\"pc\" hint-placeholder-count=\"3\">\n                        <div style=\"color:{{ enC }};text-align:center;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ pc.t }}<\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                    <sc-for list=\"{{ pmRows }}\" as=\"pr\" hint-placeholder-count=\"3\">\n                      <div style=\"display:grid;grid-template-columns:{{ pmGrid }};gap:4px\">\n                        <div style=\"color:#aeb6c0;font-size:12px;align-self:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ pr.label }}<\u002Fdiv>\n                        <sc-for list=\"{{ pr.cells }}\" as=\"pcell\" hint-placeholder-count=\"3\">\n                          <div style=\"background:#ffffff08;border-radius:4px;text-align:center;padding:5px 0;color:{{ pcell.c }};font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600\">{{ pcell.t }}<\u002Fdiv>\n                        <\u002Fsc-for>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <div style=\"background:#14181d;border:1px solid #ffffff12;border-radius:10px\">\n              <div onclick=\"{{ toggleRm }}\" style=\"display:flex;align-items:center;gap:8px;padding:12px 16px;cursor:pointer\">\n                <div style=\"font-size:12px;font-weight:700;letter-spacing:.06em;color:#aeb6c0\">REMAINING MATCHUPS<\u002Fdiv>\n                <div style=\"font-size:11px;color:#6b7480\">{{ rmCount }}<\u002Fdiv>\n                <div style=\"flex:1\"><\u002Fdiv>\n                <div style=\"font-size:11px;color:#6b7480\">{{ rmChevron }}<\u002Fdiv>\n              <\u002Fdiv>\n              <sc-if value=\"{{ rmOpen }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"padding:4px 16px 16px;border-top:1px solid #ffffff10;overflow-x:auto\">\n                  <div style=\"display:flex;flex-direction:column;gap:4px;padding-top:12px;min-width:min-content\">\n                    <div style=\"display:grid;grid-template-columns:{{ rmGrid }};gap:4px\">\n                      <div><\u002Fdiv>\n                      <sc-for list=\"{{ rmCols }}\" as=\"rc\" hint-placeholder-count=\"4\">\n                        <div style=\"color:{{ enC }};font-size:11px;font-weight:600;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 2px\">{{ rc.name }}<\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                    <sc-for list=\"{{ rmRows }}\" as=\"rr\" hint-placeholder-count=\"4\">\n                      <div style=\"display:grid;grid-template-columns:{{ rmGrid }};gap:4px\">\n                        <div style=\"color:#4e9af1;font-size:12px;font-weight:600;align-self:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ rr.name }}<\u002Fdiv>\n                        <sc-for list=\"{{ rr.cells }}\" as=\"rcell\" hint-placeholder-count=\"4\">\n                          <div style=\"display:flex;align-items:center;justify-content:center;gap:2px;background:#ffffff06;border-radius:5px;padding:6px 2px;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600\">\n                            <span style=\"color:{{ rcell.c1 }}\">{{ rcell.t1 }}<\u002Fspan><span style=\"color:#3a424c;font-size:10px\">{{ rcell.sep }}<\u002Fspan><span style=\"color:{{ rcell.c2 }}\">{{ rcell.t2 }}<\u002Fspan>\n                          <\u002Fdiv>\n                        <\u002Fsc-for>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"flex:1 1 250px;max-width:340px;padding:20px;display:flex;flex-direction:column;gap:14px\">\n            <div style=\"font-size:12px;font-weight:700;letter-spacing:.06em;color:#aeb6c0\">LOCKED PAIRINGS<\u002Fdiv>\n            <sc-for list=\"{{ history }}\" as=\"h\" hint-placeholder-count=\"2\">\n              <div style=\"background:#161b20;border:1px solid #ffffff14;border-radius:10px;padding:12px 14px;display:flex;flex-direction:column;gap:6px\">\n                <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;flex-wrap:wrap\"><span style=\"color:#4e9af1\">{{ h.mineN }}<\u002Fspan><span style=\"color:#4a525c;font-weight:400\">vs<\u002Fspan><span style=\"color:{{ enC }}\">{{ h.enN }}<\u002Fspan><\u002Fdiv>\n                <div style=\"display:flex;align-items:center;gap:8px;font-size:11px;color:#8b94a0\">{{ h.map }}<div style=\"flex:1\"><\u002Fdiv>exp<span style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:{{ h.c }}\">{{ h.score }}<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <sc-if value=\"{{ anyRemaining }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"border:1px dashed #ffffff1f;border-radius:10px;padding:12px 14px;font-size:12px;color:#6b7480\">{{ remainingLabel }}<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ draftDone }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Draft summary\" style=\"width:min(860px,100%);box-sizing:border-box;margin:0 auto;padding:30px 20px;display:flex;flex-direction:column;gap:18px\">\n        <div style=\"display:flex;gap:18px;flex-wrap:wrap\">\n          <div style=\"flex:1 1 320px;background:#161b20;border:1px solid #ffffff14;border-radius:12px;padding:24px 26px;display:flex;flex-direction:column;gap:7px\">\n            <div style=\"font-size:11px;font-weight:700;letter-spacing:.07em;color:#8b94a0\">MATCH VERDICT<\u002Fdiv>\n            <div style=\"font-size:30px;font-weight:700;line-height:1.1;color:{{ matchVerdictC }}\">{{ matchVerdict }}<\u002Fdiv>\n            <div style=\"display:flex;align-items:baseline;gap:8px;font-family:'IBM Plex Mono',monospace;font-weight:600\"><span style=\"font-size:26px;color:#4e9af1\">{{ sumMine }}<\u002Fspan><span style=\"font-size:18px;color:#4a525c\">–<\u002Fspan><span style=\"font-size:26px;color:{{ enC }}\">{{ sumEnemy }}<\u002Fspan><span style=\"font-size:12px;color:#6b7480;font-family:'IBM Plex Sans',sans-serif;font-weight:400\">expected, from your ratings<\u002Fspan><\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#8b94a0;line-height:1.5\">{{ matchVerdictSub }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1 1 320px;background:#161b20;border:1px solid #ffffff14;border-radius:12px;padding:24px 26px;display:flex;flex-direction:column;gap:7px\">\n            <div style=\"font-size:11px;font-weight:700;letter-spacing:.07em;color:#8b94a0\">DRAFT VERDICT — VS THE BOT<\u002Fdiv>\n            <div style=\"font-size:30px;font-weight:700;line-height:1.1;color:{{ verdictC }}\">{{ verdict }}<\u002Fdiv>\n            <div style=\"display:flex;align-items:baseline;gap:8px;font-family:'IBM Plex Mono',monospace;font-weight:600\"><span style=\"font-size:26px;color:{{ sumDiffC }}\">{{ sumDiff }}<\u002Fspan><span style=\"font-size:12px;color:#6b7480;font-family:'IBM Plex Sans',sans-serif;font-weight:400\">vs pre-draft plan of<\u002Fspan><span style=\"font-size:16px;color:#b9c0c8\">{{ sumExp }}<\u002Fspan><\u002Fdiv>\n            <div style=\"font-size:12.5px;color:#8b94a0;line-height:1.5\">{{ verdictSub }}<\u002Fdiv>\n            <div style=\"font-size:12px;color:#6b7480;font-family:'IBM Plex Mono',monospace\">{{ regLine }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#161b20;border:1px solid #ffffff14;border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:8px\">\n          <div style=\"font-size:12px;font-weight:700;letter-spacing:.06em;color:#aeb6c0;margin-bottom:4px\">YOUR PICKS<\u002Fdiv>\n          <sc-if value=\"{{ noReg }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:13px;color:#8b94a0\">No regrets — every pick matched the engine's best move at the time.<\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-for list=\"{{ regRows }}\" as=\"rg\" hint-placeholder-count=\"2\">\n            <div style=\"display:flex;align-items:center;gap:10px;padding:9px 12px;background:#14181d;border-radius:8px;font-size:13px;flex-wrap:wrap\">\n              <span style=\"color:#c3cad2\">{{ rg.label }}<\u002Fspan>\n              <span style=\"color:#6b7480;font-size:12px\">·<\u002Fspan>\n              <span style=\"color:#8b94a0;font-size:12px\">{{ rg.best }}<\u002Fspan>\n              <div style=\"flex:1\"><\u002Fdiv>\n              <span style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;color:{{ rg.c }}\">{{ rg.val }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"background:#161b20;border:1px solid #ffffff14;border-radius:12px;padding:20px;display:flex;flex-direction:column;gap:8px\">\n          <div style=\"font-size:12px;font-weight:700;letter-spacing:.06em;color:#aeb6c0;margin-bottom:4px\">FINAL PAIRINGS<\u002Fdiv>\n          <sc-for list=\"{{ sumPairs }}\" as=\"p\" hint-placeholder-count=\"8\">\n            <div style=\"display:flex;align-items:center;gap:10px;padding:9px 12px;background:#14181d;border-radius:8px;font-size:13px;flex-wrap:wrap\">\n              <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#4a525c;width:18px\">{{ p.n }}<\u002Fspan>\n              <span style=\"color:#4e9af1;font-weight:600\">{{ p.mineN }}<\u002Fspan><span style=\"color:#4a525c\">vs<\u002Fspan><span style=\"color:{{ enC }};font-weight:600\">{{ p.enN }}<\u002Fspan>\n              <div style=\"flex:1\"><\u002Fdiv>\n              <span style=\"font-size:11px;color:#6b7480\">{{ p.map }}<\u002Fspan>\n              <span style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;color:{{ p.c }};width:40px;text-align:right\">{{ p.score }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:12px;flex-wrap:wrap\">\n          <button onclick=\"{{ onStartDraft }}\" style=\"font-family:inherit;font-size:14px;font-weight:600;color:#101418;background:#4e9af1;border:none;border-radius:8px;padding:11px 24px;cursor:pointer\" style-hover=\"filter:brightness(1.1)\">Run it back<\u002Fbutton>\n          <button onclick=\"{{ onUndo }}\" style=\"font-family:inherit;font-size:13px;color:#aeb6c0;background:#ffffff0d;border:1px solid #ffffff1a;border-radius:8px;padding:11px 18px;cursor:pointer\">↩ Undo last stage<\u002Fbutton>\n          <button onclick=\"{{ onGoMatrix }}\" style=\"font-family:inherit;font-size:13px;color:#aeb6c0;background:#ffffff0d;border:1px solid #ffffff1a;border-radius:8px;padding:11px 18px;cursor:pointer\">Edit matrix<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;botStyle&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;equilibrium&quot;,&quot;greedy&quot;,&quot;wildcard&quot;],&quot;default&quot;:&quot;equilibrium&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Bot behavior&quot;},&quot;revealMs&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;min&quot;:200,&quot;max&quot;:2000,&quot;step&quot;:100,&quot;default&quot;:1200,&quot;unit&quot;:&quot;ms&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Bot behavior&quot;},&quot;hintsLocked&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Competition integrity&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'matrix',\n    cb: false,\n    myTeam: 'Norway', enemyTeam: 'Scotland',\n    myNames: ['Tyranids','Necrons','Space Marines','Astra Militarum','Thousand Sons','Orks','Imperial Knights',\"T'au Empire\"],\n    enemyNames: ['Sisters','Blood Angels','Imperial Knights','AdMech','Tyranids','Chaos Knights','Drukhari','Craftworlds'],\n    cells: this.defaultCells(),\n    saves: {}, activeSave: null, saveName: '',\n    pasteOpen: false, pasteText: '', pasteErr: '',\n    simpleMode: true,\n    solStatus: 'idle', solProg: 0, solMsg: '', solRes: null,\n    draft: null, undoStack: [], whyOpen: true, rmOpen: false, hints: false,\n    aboutOpen: false, confirm: null\n  };\n  fileRef = React.createRef();\n\n  defaultCells() {\n    const rp = [1.5,.5,1,-.5,-1,.5,1.5,0], cp = [.5,1,-.5,1.5,0,-1,.5,-.5];\n    let s = 42; const rnd = () => { s = (s * 1103515245 + 12345) % 2147483648; return s / 2147483648; };\n    const cells = [];\n    for (let i = 0; i < 8; i++) { const row = [];\n      for (let j = 0; j < 8; j++) {\n        const base = 10 + rp[i] - cp[j] + (rnd() * 4 - 2);\n        const b = Math.round(Math.min(17, Math.max(4, base + 1 + rnd() * 2)));\n        const w = Math.round(Math.min(b, Math.max(2, base - 1 - rnd() * 2)));\n        row.push({ b: String(b), w: String(w) });\n      } cells.push(row); }\n    return cells;\n  }\n\n  componentDidMount() {\n    try { const raw = localStorage.getItem('wtcDraftTrainer');\n      if (raw) { const d = JSON.parse(raw);\n        const patch = { cb: !!d.cb, simpleMode: d.simpleModeV2 === undefined ? true : !!d.simpleModeV2, saves: d.saves || {} };\n        if (d.current && d.current.cells) Object.assign(patch, d.current);\n        this.setState(patch); }\n    } catch (e) {}\n  }\n  componentWillUnmount() { clearTimeout(this.revT); clearInterval(this.solT); }\n  persist() { try { const { cb, simpleMode, saves, myTeam, enemyTeam, myNames,        v1 = simple ? String(Math.round(avg)) : this.fmt(avg);\n            v2 = simple ? String(Math.round(mn)) : this.fmt(mn);\n          } else if (dft.stage === 'attackers') { subLabel = 'vs ' + s.enemyNames[dft.enDef] + ' · their map'; op = 'w';\n            v1 = this.fmt(M[idx][dft.enDef].b); v2 = this.fmt(M[idx][dft.enDef].w);\n          } else { subLabel = s.myNames[dft.myDef] + ' vs them · our map'; op = 'b';\n            v1 = this.fmt(M[dft.myDef][idx].b); v2 = this.fmt(M[dft.myDef][idx].w); }\n          if (simple && op !== 'both') { v1 = String(Math.round((parseFloat(v1) + parseFloat(v2)) / 2)); v2 = ''; }\n          if (sep === undefined) sep = simple ? '' : '/';\n          return { name: names[i], onPick: () => this.pick(idx),\n            nameC: dft.stage === 'refusal' ? RED : '#ffffff',\n            cbg: sel ? '#4e9af114' : '#161b20', brd: sel ? BLUE : '#ffffff14',\n            badgeTxt: dft.stage === 'attackers' ? String(selN + 1) : '✓',\n            badgeBg: BLUE, badgeOp: sel ? '1' : '0',\n            subLabel, v1, v2, sep, sepC: op === 'both' ? '#8b94a0' : '#4a525c',\n            v1c: op === 'both' || simple || op === 'b' ? this.fav(parseFloat(v1)) : '#4a525c',\n            v2c: op === 'both' ? this.fav(parseFloat(v2)) : (v2 === '' || op === 'b' ? '#4a525c' : this.fav(parseFloat(v2))),\n            barW: Math.max(3, Math.round(probs[i] / maxP * 100)) + '%',\n            barC: sel ? BLUE : '#6b7480',\n            pct: Math.round(probs[i] * 100) + '%', pctC: sel ? BLUE : '#8b94a0' }; });\n\n        // stage boards\n        const mkCell = (text, kind) => ({ text, anim: 'none', ...({\n          mysteryRed: { bg: RED + '0d', brd: '1px dashed ' + RED + '66', c: RED, op: '1' },\n          redSolid: { bg: RED + '14', brd: '1px solid ' + RED, c: RED, op: '1' },\n          redDim: { bg: RED + '0d', brd: '1px solid ' + RED + '44', c: RED, op: '.45' },\n          blueSolid: { bg: '#4e9af114', brd: '1px solid #4e9af1', c: '#ffffff', op: '1' },\n          blueDash: { bg: '#4e9af10a', brd: '1px dashed #4e9af166', c: '#8b94a0', op: '1' },\n          faint: { bg: 'transparent', brd: '1px dashed #ffffff1f', c: '#6b7480', op: '1' },\n          neutral: { bg: '#ffffff06', brd: '1px solid #ffffff12', c: '#c3cad2', op: '1' },\n          reveal: { bg: RED + '22', brd: '1px solid ' + RED, c: RED, op: '1', anim: 'wtcFlip .45s ease-out' } })[kind] });\n        const mkB = (title, def, tag, tagC, slots, note) => ({ title, defName: def.text, defBg: def.bg, defBrd: def.brd, defC: def.c, defAnim: def.anim, defTag: tag, defTagC: tagC, slots, note: note || '' });\n        let defL, slotsL, noteL;\n        if (dft.stage === 'defender') {\n          defL = dft.sel.length ? mkCell(s.myNames[dft.sel[0]], 'blueSolid') : mkCell('selecting…', 'blueDash');\n          slotsL = [mkCell('?', 'mysteryRed'), mkCell('?', 'mysteryRed')];\n          noteL = 'Their two attackers will land here';\n        } else if (dft.stage === 'attackers') {\n          defL = mkCell(s.myNames[dft.myDef], 'blueSolid');\n          slotsL = [mkCell('?', 'mysteryRed'), mkCell('?', 'mysteryRed')];\n          noteL = 'Their attackers — picked now, hidden until you lock';\n        } else {\n          defL = mkCell(s.myNames[dft.myDef], 'blueSolid');\n          const anySel = dft.sel.length > 0;\n          slotsL = dft.enAtks.map(a => mkCell(s.enemyNames[a], dft.sel.includes(a) || !anySel ? 'redSolid' : 'redDim'));\n          noteL = 'Choose who ' + s.myNames[dft.myDef] + ' faces — the other is refused';\n        }\n        if (dft.revealing && dft.stage === 'attackers') { slotsL = dft.revealing.atks.map(a => mkCell(s.enemyNames[a], 'reveal')); noteL = '! ' + s.enemyTeam + ' sent these attackers'; }\n        v.boards.push(mkB('OUR DEFENDER · OUR MAP', defL, 'DEF', '#4e9af1', slotsL, noteL));\n        let defR, slotsR, noteR;\n        if (dft.stage === 'defender') {\n          defR = mkCell('?', 'mysteryRed');\n          slotsR = [mkCell('—', 'faint'), mkCell('—', 'faint')];\n          noteR = 'Your two attackers will land here';\n        } else if (dft.stage === 'attackers') {\n          defR = mkCell(s.enemyNames[dft.enDef], 'redSolid');\n          slotsR = [0, 1].map(i => dft.sel[i] !== undefined ? mkCell(s.myNames[dft.sel[i]], 'blueSolid') : mkCell('select…', 'blueDash'));\n          noteR = 'You send two — they choose one';\n        } else {\n          defR = mkCell(s.enemyNames[dft.enDef], 'redSolid');\n          slotsR = dft.myAtks.map(a => mkCell(s.myNames[a], 'blueSolid'));\n          noteR = 'They choose whom to face — hidden until you lock';\n        }\n        if (dft.revealing && dft.stage === 'defender') { defR = mkCell(s.enemyNames[dft.revealing.def], 'reveal'); noteR = '! ' + s.enemyTeam + ' put this up'; }\n        if (dft.revealing && dft.stage === 'refusal') { slotsR = dft.myAtks.map(a => mkCell(s.myNames[a], a === dft.revealing.face ? 'reveal' : 'blueDash')); noteR = '! ' + s.enemyNames[dft.enDef] + ' takes ' + s.myNames[dft.revealing.face]; }\n        v.boards.push(mkB('THEIR DEFENDER · THEIR MAP', defR, 'DEF', RED, slotsR, noteR));\n        if (final && dft.stage !== 'defender') {\n          let myL = '?', enL = '?', refThem = '?';\n          if (dft.stage === 'attackers') {\n            if (dft.sel.length === 2) { const l = dft.myPool.find(x => x !== dft.myDef && !dft.sel.includes(x)); myL = s.myNames[l]; }\n          } else {\n            myL = s.myNames[dft.myPool.find(x => x !== dft.myDef && !dft.myAtks.includes(x))];\n            enL = s.enemyNames[dft.enPool.find(x => x !== dft.enDef && !dft.enAtks.includes(x))];\n            if (dft.sel.length) refThem = s.enemyNames[dft.enAtks.find(x => x !== dft.sel[0])];\n          }\n          v.boards.push(mkB('AUTO-PAIRED THIS ROUND', mkCell(myL + ' vs ' + enL, 'neutral'), 'LAST', '#6b7480',\n            [mkCell('refused: ? vs ' + refThem, 'faint')], 'Resolves on lock · scored as avg of both maps'));\n        }\n\n        // lock row\n        const selNames = dft.sel.map(i => (dft.stage === 'refusal' ? s.enemyNames : s.myNames)[i]);\n        if (dft.stage === 'defender') { v.lockLabel = dft.sel.length ? 'Lock in ' + selNames[0] : 'Select a defender'; }\n        else if (dft.stage === 'attackers') { v.lockLabel = dft.sel.length === 2 ? 'Lock in ' + selNames.join(' + ') : 'Select two attackers (' + dft.sel.length + '/2)'; }\n        else { v.lockLabel = dft.sel.length ? s.myNames[dft.myDef] + ' faces ' + selNames[0] : 'Choose an opponent'; }\n        const can = (dft.stage === 'attackers' ? dft.sel.length === 2 : dft.sel.length === 1) && !dft.revealing;\n        if (can) { v.lockBg = BLUE; v.lockFg = '#101418'; }\n        v.lockNote = s.enemyTeam + ' picks simultaneously — revealed after you lock.';\n\n        // projection\n        const proj = maxEv;\n        v.projTotal = this.fmt(proj);\n        const pd = proj - dft.preExp;\n        v.projDelta = (pd >= 0 ? '+' : '−') + this.fmt(Math.abs(pd)) + ' vs plan';\n        v.projDeltaC = Math.abs(pd) < 0.15 ? '#b9c0c8' : (pd > 0 ? GOOD : BAD);\n\n        // why panel\n        const minEv = Math.min(...evs);\n        const span = Math.max(0.001, maxEv - minEv);\n        const mkEvRow = (label, ev) => ({ label, ev: this.fmt(ev),\n          c: ev === maxEv ? GOOD : '#aeb6c0', bc: ev === maxEv ? GOOD : '#6b7480',\n          w: Math.max(8, Math.round(30 + (ev - minEv) / span * 70)) + '%' });\n        if (dft.stage === 'attackers') { const { prs, pEvs } = v._pairData;\n          const order = prs.map((p, k) => ({ p, ev: pEvs[k] })).sort((a, b) => b.ev - a.ev).slice(0, 3);\n          const mn = Math.min(...order.map(o => o.ev)), mx = Math.max(...order.map(o => o.ev)), sp = Math.max(0.001, mx - mn);\n          v.evRows = order.map(o => ({ label: s.myNames[o.p[0]] + ' + ' + s.myNames[o.p[1]], ev: this.fmt(o.ev),\n            c: o.ev === mx ? GOOD : '#aeb6c0', bc: o.ev === mx ? GOOD : '#6b7480',\n            w: Math.max(8, Math.round(30 + (o.ev - mn) / sp * 70)) + '%' }));\n          const colIds = [...new Set(order.flatMap(o => o.p))].slice(0, 4);\n          v.pmTitle = 'PAYOFF — ' + s.enemyNames[dft.enDef].toUpperCase() + ' CHOOSES WHOM TO FACE';\n          v.pmGrid = '130px repeat(' + colIds.length + ',1fr)';\n          v.pmCols = colIds.map(a => ({ t: 'faces ' + s.myNames[a] }));\n          v.pmRows = order.map(o => ({ label: s.myNames[o.p[0]] + ' + ' + s.myNames[o.p[1]],\n            cells: colIds.map(a => { if (!o.p.includes(a)) return { t: '—', c: '#4a525c' }; const sc = mapScore(a, dft.enDef, 'w'); return { t: mapDisp(sc), c: this.fav(sc) }; }) }));\n        } else if (dft.stage === 'defender') {\n          const order = cands.map((d, i) => ({ d, ev: evs[i] })).sort((a, b) => b.ev - a.ev);\n          v.evRows = order.slice(0, 4).map(o => mkEvRow(s.myNames[o.d], o.ev));\n          const threats = dft.enPool.slice().sort((a, b) => this.colMean(M, a, dft.myPool) - this.colMean(M, b, dft.myPool)).slice(0, 3);\n          v.pmTitle = simple ? 'SCORE VS THEIR BIGGEST THREATS' : 'BEST-MAP SCORE VS THEIR BIGGEST THREATS';\n          v.pmGrid = '130px repeat(' + threats.length + ',1fr)';\n          v.pmCols = threats.map(e => ({ t: s.enemyNames[e] }));\n          v.pmRows = order.slice(0, 3).map(o => ({ label: s.myNames[o.d],\n            cells: threats.map(e => { const sc = mapScore(o.d, e, 'b'); return { t: mapDisp(sc), c: this.fav(sc) }; }) }));\n        } else {\n          v.evRows = cands.map((x, i) => mkEvRow('Face ' + s.enemyNames[x], evs[i]));\n          v.pmTitle = (simple ? 'SCORE FOR ' : 'BEST-MAP SCORE FOR ') + s.myNames[dft.myDef].toUpperCase();\n          v.pmGrid = '130px repeat(2,1fr)';\n          v.pmCols = cands.map(x => ({ t: 'vs ' + s.enemyNames[x] }));\n          v.pmRows = [{ label: s.myNames[dft.myDef], cells: cands.map(x => { const sc = mapScore(dft.myDef, x, 'b'); return { t: mapDisp(sc), c: this.fav(sc) }; }) }];\n        }\n      }\n\n      if (dft.stage === 'done') {\n        const total = this.lockedOf(dft);\n        const diff = total - dft.preExp;\n        const ad = Math.abs(diff);\n        let verdict;\n        if (ad <= 1) { verdict = 'EVEN DRAFT'; v.verdictC = '#b9c0c8'; }\n        else { const win = diff > 0;\n          verdict = (ad <= 4 ? 'SMALL ' : ad <= 8 ? '' : ad <= 16 ? 'LARGE ' : 'CRUSHING ') + (win ? 'EDGE' : 'DEFICIT');\n          v.verdictC = win ? GOOD : BAD; }\n        const decs = (dft.decisions || []).slice();\n        const regTotal = decs.reduce((a, d) => a + d.reg, 0);\n        const variance = diff + regTotal;\n        const clean = regTotal <= 0.5;\n        let sub;\n        if (diff < -1) sub = clean ? 'Clean draft — unlucky reveals.'\n          : 'Your picks cost ' + this.fmt(regTotal) + ' of the ' + this.fmt(ad) + '-point deficit.';\n        else if (diff > 1) sub = clean ? 'Perfect picks, and the reveals broke your way.'\n          : 'Lucky reveals — up ' + this.fmt(ad) + ' despite picks costing ' + this.fmt(regTotal) + '.';\n        else sub = clean ? 'Clean draft — it went to plan.'\n          : 'Your picks cost ' + this.fmt(regTotal) + ', but the reveals gave it back.';\n        v.verdict = verdict; v.verdictSub = sub;\n        v.regLine = 'your picks cost ' + this.fmt(regTotal) + ' · variance ' + (variance >= 0 ? '+' : '−') + this.fmt(Math.abs(variance));\n        v.regRows = decs.map(d => ({\n          label: 'R' + d.r + ' ' + d.stage + ' — ' + d.verb + ' ' + d.chosen,\n          best: d.best ? 'best ' + d.best : 'best move',\n          val: d.best ? '−' + this.fmt(d.reg) : '✓ 0.0',\n          c: d.best ? (d.reg >= 2 ? BAD : '#e0914b') : GOOD }));\n        v.noReg = decs.length === 0;\n        const R = Math.round(total);\n        const winSide = R >= 80;\n        let mv;\n        if (R >= 78 && R <= 82) { mv = 'DEAD DRAW'; v.matchVerdictC = '#b9c0c8'; }\n        else if (R >= 83 && R <= 85) { mv = 'WINNING DRAW'; v.matchVerdictC = GOOD; }\n        else if (R >= 75 && R <= 77) { mv = 'LOSING DRAW'; v.matchVerdictC = BAD; }\n        else { const m = Math.abs(R - 80);\n          const grade = winSide ? (R <= 90 ? 'CLOSE WIN' : R <= 100 ? 'WIN' : R <= 115 ? 'LARGE WIN' : 'CRUSHING WIN')\n                                : (R >= 70 ? 'CLOSE LOSS' : R >= 60 ? 'LOSS' : R >= 45 ? 'LARGE LOSS' : 'CRUSHING LOSS');\n          mv = grade; v.matchVerdictC = winSide ? GOOD : BAD; }\n        v.matchVerdict = mv;\n        v.matchVerdictSub = 'Rounds to ' + R + ' – ' + (160 - R) + '. WTC: 75–85 is a drawn match.';\n        v.sumMine = this.fmt(total); v.sumEnemy = this.fmt(160 - total); v.sumExp = this.fmt(dft.preExp);\n        v.sumDiff = (diff >= 0 ? '+' : '−') + this.fmt(ad); v.sumDiffC = ad <= 0.5 ? '#b9c0c8' : (diff > 0 ? GOOD : BAD);\n        v.sumPairs = dft.pairings.map((p, i) => ({ n: String(i + 1).padStart(2, '0'),\n          mineN: s.myNames[p.mi], enN: s.enemyNames[p.ei], map: p.map, score: this.fmt(p.score), c: this.fav(p.score) }));\n      }\n    }\n    return v;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
